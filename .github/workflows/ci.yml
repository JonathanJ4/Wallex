name: Wallex Backend CI

on:
 
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: wallex_db
          POSTGRES_USER: wallex_user
          POSTGRES_PASSWORD: wallex_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wallex_user -d wallex_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/wallex_db
      SPRING_DATASOURCE_USERNAME: wallex_user
      SPRING_DATASOURCE_PASSWORD: wallex_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_JPA_SHOW_SQL: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw clean verify