name: Wallex Frontend CI

on: 
    
    
    workflow_dispatch:

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run OxLint
        run: npm run lint

      - name: Build frontend
        run: npm run build